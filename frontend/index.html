<!DOCTYPE html>
<html>
<head>

<title>UpdateCheck Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gradient-to-br from-cyan-400 via-cyan-200 to-sky-300 min-h-screen flex">

<!-- SIDEBAR -->

<div class="w-64 bg-white shadow-lg p-6">

<h1 class="text-2xl font-bold mb-10 text-cyan-600">
UpdateCheck
</h1>

<nav class="space-y-4">

<a class="block text-gray-700 hover:text-cyan-600 font-medium">
Dashboard
</a>

<a class="block text-gray-700 hover:text-cyan-600 font-medium">
Change Logs
</a>

</nav>

</div>


<!-- MAIN CONTENT -->

<div class="flex-1 p-10">

<h2 class="text-3xl font-bold mb-8">
Dashboard
</h2>

<!-- STATS -->

<div class="grid grid-cols-3 gap-6 mb-10">

<div class="bg-white p-6 rounded-xl shadow">

<p class="text-gray-500">Tracked Sites</p>

<h3 id="siteCount" class="text-2xl font-bold">
0
</h3>

</div>

<div class="bg-white p-6 rounded-xl shadow">

<p class="text-gray-500">Changes Found</p>

<h3 id="changeCount" class="text-2xl font-bold text-red-500">
0
</h3>

</div>

<div class="bg-white p-6 rounded-xl shadow">

<p class="text-gray-500">System Status</p>

<h3 class="text-green-500 font-bold">
Running
</h3>

</div>

</div>


<!-- ADD URL -->

<div class="bg-white p-6 rounded-xl shadow mb-10">

<h3 class="text-lg font-semibold mb-4">
Add Website
</h3>

<div class="flex gap-4">

<input
id="urlInput"
type="text"
placeholder="Enter website URL"
class="flex-1 border rounded-lg px-4 py-2"
/>

<button
onclick="addUrl()"
class="bg-cyan-500 hover:bg-cyan-600 text-white px-6 py-2 rounded-lg">

Track

</button>

</div>

</div>


<!-- TRACKED WEBSITES -->

<div class="bg-white p-6 rounded-xl shadow mb-10">

<h3 class="text-lg font-semibold mb-4">
Tracked Websites
</h3>

<div id="urlList" class="space-y-3"></div>

</div>


<!-- CHANGE LOG -->

<div class="bg-white p-6 rounded-xl shadow">

<h3 class="text-lg font-semibold mb-4">
Recent Changes
</h3>

<div id="changeLog" class="space-y-3"></div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
